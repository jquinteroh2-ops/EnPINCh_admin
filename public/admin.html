<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EN PIN CH — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/admin.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

  <!-- ═══ SIDEBAR ═══════════════════════════════════════ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <span class="s-logo-char">龍</span>
      <div>
        <span class="s-logo-name">EN PIN CH</span>
        <span class="s-logo-sub">Admin Panel</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a class="nav-item" href="#dashboard" data-page="dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a class="nav-item" href="#pedidos" data-page="pedidos">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        Pedidos
      </a>
      <a class="nav-item" href="#reservas" data-page="reservas">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Reservas
      </a>
      <!-- <a class="nav-item" href="#menu" data-page="menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 2h18M3 12h18M3 22h18"/><circle cx="7" cy="7" r="1"/><circle cx="7" cy="17" r="1"/></svg>
        Menú
      </a> -->
      <a class="nav-item" href="#contabilidad" data-page="contabilidad">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
        Contabilidad
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-chip" id="userChip">
        <div class="user-avatar" id="userAvatar">A</div>
        <div class="user-info">
          <span class="user-name" id="userName">Admin</span>
          <span class="user-role" id="userRole">Super Admin</span>
        </div>
      </div>
      <button class="btn-logout" id="logoutBtn" title="Cerrar sesión">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </aside>

  <!-- ═══ MAIN ══════════════════════════════════════════ -->
  <div class="main-wrapper">
    <header class="topbar">
      <button class="sidebar-toggle" id="sidebarToggle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <h1 class="page-title" id="pageTitle">Dashboard</h1>
      <div class="topbar-right">
        <span class="topbar-date" id="topbarDate"></span>
      </div>
    </header>

    <main class="content" id="mainContent">
      <div class="page-loader" id="pageLoader">
        <div class="spinner"></div>
      </div>
    </main>
  </div>

  <!-- ═══ OVERLAY ═══════════════════════════════════════ -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- ═══ TOAST ════════════════════════════════════════ -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- ═══ MODAL ════════════════════════════════════════ -->
  <div class="modal-backdrop hidden" id="modalBackdrop">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="modalTitle">Título</h3>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer" id="modalFooter"></div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/pedidos.js"></script>
  <script src="js/pages/reservas.js"></script>
  <!-- <script src="js/pages/menu-admin.js"></script> -->
  <script src="js/pages/contabilidad.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
